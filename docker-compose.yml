services:
  crimson.auth:
    image: ${DOCKER_REGISTRY-}crimsonauth
    build:
      context: .
      dockerfile: services/Crimson.Auth/src/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: crimson_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crimson_auth"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - crimson-pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  crimson-pgdata:
