name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore crimson-api.sln

      - name: Build
        run: dotnet build crimson-api.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test crimson-api.sln --no-build --configuration Release
